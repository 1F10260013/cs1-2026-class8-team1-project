<h2>強豪国となった2大スポーツ</h2>

    <div class="information">
        <p>大谷翔平や山本由伸らがメジャーを席巻し、WBCで3度の優勝を誇る「野球」。</p>
        <p>久保、三笘、上田ら最旬のスターたちが欧州で輝き、Eloレーティング世界11位と大躍進を続ける「サッカー」。</p>
        <p>今や日本は、世界からも恐れられるハイレベルなスポーツ強豪国となりました。</p>
        <p>ここでは、そんな国内外で熱狂を生み出し続けるサッカーと野球の魅力やルールを詳しく紹介していきます。</p>
